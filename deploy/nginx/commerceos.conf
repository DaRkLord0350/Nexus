# CommerceOS reverse proxy.
#
# If the frontend is hosted on AWS Amplify/CloudFront (recommended), delete the
# "location /" block below and point Route 53 for the API subdomain only
# (e.g. api.commerceos.example.com) at this instance/ALB. Keep the whole file
# if you chose to host the Next.js app on this same EC2 instance instead.
#
# TLS is expected to be terminated here with a certificate issued by
# AWS Certificate Manager + attached to the ALB, OR by certbot directly on the
# instance if you are not fronting this box with an ALB. The server blocks
# below assume ALB termination (plain HTTP upstream, HTTPS enforced by the ALB
# listener + the app's FORCE_HTTPS setting). See the deployment guide for the
# certbot variant.

upstream commerceos_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream commerceos_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # ALB health check target
    location = /health {
        proxy_pass http://commerceos_api/health;
        access_log off;
    }

    location /api/ {
        proxy_pass http://commerceos_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /live {
        proxy_pass http://commerceos_api/live;
    }

    location /ready {
        proxy_pass http://commerceos_api/ready;
    }

    # Remove this block if the frontend is hosted on Amplify/CloudFront instead.
    location / {
        proxy_pass http://commerceos_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
